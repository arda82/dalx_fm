name: dalx
description: "DalX — Explore, Find, Manage. File manager Android modern, ringan, dan powerful."
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Permission & Storage Access Framework
  permission_handler: ^11.3.1
  
  # Share Sheet — Fase 1
  share_plus: ^10.1.2

  # Ikon Material Design tambahan (opsional, dipakai bertahap)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Aset akan ditambahkan bertahap seiring fase berjalan
  # (app icon, dll — sudah ada asetnya dari brand board DalX)
  # assets:
  #   - assets/icons/
