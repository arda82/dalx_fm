name: Build APK

# Build otomatis tiap push ke main, atau manual lewat tab Actions
# (workflow_dispatch) kalau mau build tanpa push dulu.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # HAS_KEYSTORE dipakai step "Setup signing" untuk cek apakah
    # secret KEYSTORE_BASE64 sudah diisi, tanpa membaca `secrets`
    # langsung di kondisi `if` (yang tidak didukung GitHub Actions).
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Ambil dependency
        run: flutter pub get

      # Versi APK ikut nomor run GitHub Actions, biar tiap build
      # punya versionCode unik tanpa perlu diketik manual tiap kali.
      # Skema: 0.0.<run_number> — sesuaikan kalau nanti pindah ke
      # skema MAJOR.MINOR.PATCH seperti TaniLog.
      - name: Set nomor versi build
        run: |
          echo "Build number: ${{ github.run_number }}"
          sed -i "s/^version: .*/version: 0.0.${{ github.run_number }}+${{ github.run_number }}/" pubspec.yaml
          cat pubspec.yaml | grep version

      - name: Analisis kode (non-blocking)
        run: flutter analyze || true

      # Signing release: begitu keystore & GitHub Secrets sudah
      # disiapkan (lihat catatan di bawah), langkah ini otomatis
      # menulis key.properties yang dibaca build.gradle.
      #
      # Catatan teknis: kondisi `if` pada step GitHub Actions tidak
      # boleh membaca `secrets` secara langsung (itu penyebab error
      # "Unrecognized named-value: 'secrets'") — jadi secret dioper
      # dulu lewat `env` di level job, baru dicek pakai `env.` di sini.
      - name: Setup signing (kalau secrets tersedia)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/dalx-release.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=dalx-release.jks
          EOF

      # --split-per-abi: hasilkan APK TERPISAH per arsitektur CPU
      # (armeabi-v7a/arm64-v8a/x86_64), bukan satu APK "gemuk" yang
      # bawa native lib buat ketiganya sekaligus. Ini flag CLI resmi
      # Flutter — SENGAJA bukan lewat splits{} manual di build.gradle,
      # karena itu konflik sama abiFilters otomatis Flutter Gradle
      # Plugin versi baru (lihat catatan di build.gradle).
      - name: Build APK (release, split per ABI)
        run: flutter build apk --release --split-per-abi

      # Hasil --split-per-abi ada 3 file: app-armeabi-v7a-release.apk,
      # app-arm64-v8a-release.apk, app-x86_64-release.apk. Upload
      # ketiganya jadi satu artifact (di-zip otomatis sama GitHub) —
      # download, extract, lalu pilih yang cocok sama HP kamu. HP
      # Android keluaran beberapa tahun terakhir (termasuk Xiaomi/
      # HyperOS) hampir pasti arm64-v8a — kalau ragu, cek di
      # Settings > About Phone > kernel/CPU info, atau pasang app
      # semacam "CPU-Z" buat lihat arsitektur pastinya.
      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: dalx-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 3
