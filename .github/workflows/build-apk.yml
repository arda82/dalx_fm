
name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Set version otomatis
        run: |
          # Format: MAJOR.MINOR.PATCH+BUILD
          # MAJOR di-hardcode (ubah manual di baris ini kalau ada rilis besar berikutnya)
          # MINOR = run_number / 10, PATCH = run_number % 10 (rollover otomatis tiap 10 build)
          # BUILD (setelah +) = run_number asli, wajib selalu naik untuk versionCode Android
          MAJOR=2
          RUN_NUM=${{ github.run_number }}
          MINOR=$((RUN_NUM / 10))
          PATCH=$((RUN_NUM % 10))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}+${RUN_NUM}"
          echo "Version: $NEW_VERSION"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          cat pubspec.yaml | grep version
          # Simpan versi tampilan (tanpa +BUILD) untuk dipakai di step-step berikutnya
          echo "APP_VERSION=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/tanilog-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=tanilog-release.keystore
          EOF

      - name: Build APK release (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk       TaniLog-v${{ env.APP_VERSION }}-arm64.apk
          mv app-armeabi-v7a-release.apk     TaniLog-v${{ env.APP_VERSION }}-armv7.apk
          mv app-x86_64-release.apk          TaniLog-v${{ env.APP_VERSION }}-x86_64.apk
          ls -lh *.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TaniLog-v${{ env.APP_VERSION }}
          path: build/app/outputs/flutter-apk/TaniLog-v${{ env.APP_VERSION }}-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "TaniLog v${{ env.APP_VERSION }}"
          files: build/app/outputs/flutter-apk/TaniLog-v${{ env.APP_VERSION }}-*.apk
          body: |
            ## 🌾 TaniLog v${{ env.APP_VERSION }}

            Build otomatis dari GitHub Actions.

            **Pilih APK sesuai HP:**
            - `arm64.apk` → HP modern (2018 ke atas, hampir semua HP Android saat ini). **Pilih ini kalau ragu.**
            - `armv7.apk` → HP lama/32-bit.
            - `x86_64.apk` → emulator/tablet Intel (jarang dipakai).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
