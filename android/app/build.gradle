plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '0.0.1'
}

// Baca android/key.properties untuk signing release — dibuat otomatis
// oleh workflow GitHub Actions (.github/workflows/build-apk.yml) kalau
// secrets KEYSTORE_BASE64 dkk sudah diisi. Sampai keystore production
// disiapkan, file ini belum ada, jadi build tetap jalan pakai debug
// signing (lihat buildTypes.release di bawah).
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasReleaseSigning = keystorePropertiesFile.exists()
if (hasReleaseSigning) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.dalx.app"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // Package name DalX — huruf kecil semua sesuai konvensi Android
        applicationId "com.dalx.app"

        // Minimum SDK 30 (Android 11) — disepakati karena scoped
        // storage & hidden file access lebih clean di versi ini.
        // Lihat ARCHITECTURE.md bagian 8.
        minSdk 30
        targetSdk 34

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Pakai signing production kalau key.properties ada
            // (disiapkan otomatis oleh GitHub Actions dari Secrets).
            // Sebelum itu disiapkan, fallback ke debug keys supaya
            // `flutter build apk` tetap jalan dari Termux.
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
